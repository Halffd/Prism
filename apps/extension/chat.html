<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prism Chat</title>
  <style>
    :root {
      /* Dark Theme Colors */
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-tertiary: #334155;
      --bg-card: #1e293b;
      --bg-input: #0f172a;
      --bg-hover: #334155;
      --bg-active: #475569;
      --bg-overlay: rgba(15, 23, 42, 0.85);

      /* Text Colors */
      --text-primary: #e6e9f0;
      --text-secondary: #cbd5e0;
      --text-muted: #94a3b8;
      --text-accent: #8b5cf6;

      /* Border Colors */
      --border-primary: #334155;
      --border-secondary: #475569;

      /* Button Colors */
      --btn-primary-bg: #8b5cf6;
      --btn-primary-hover: #7c3aed;
      --btn-secondary-bg: #3b82f6;
      --btn-secondary-hover: #2563eb;
      --btn-danger-bg: #ef4444;
      --btn-danger-hover: #dc2626;
      --btn-success-bg: #10b981;
      --btn-success-hover: #059669;

      /* Gradient Colors */
      --gradient-primary: linear-gradient(135deg, #8b5cf6 0%, #a78bfa 100%);
      --gradient-secondary: linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%);

      /* Accent Colors */
      --accent-purple: #8b5cf6;
      --accent-blue: #3b82f6;
      --accent-green: #10b981;
      --accent-yellow: #f59e0b;
      --accent-red: #ef4444;

      /* Shadow */
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.3);
      --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.3);
      --shadow-xl: 0 20px 25px rgba(0, 0, 0, 0.4);

      /* Spacing */
      --spacing-xs: calc(4px * var(--font-scale, 1));
      --spacing-sm: calc(8px * var(--font-scale, 1));
      --spacing-md: calc(12px * var(--font-scale, 1));
      --spacing-lg: calc(16px * var(--font-scale, 1));
      --spacing-xl: calc(20px * var(--font-scale, 1));
      --spacing-2xl: calc(24px * var(--font-scale, 1));
      --spacing-3xl: calc(32px * var(--font-scale, 1));

      /* Border Radius */
      --radius-sm: calc(4px * var(--font-scale, 1));
      --radius-md: calc(8px * var(--font-scale, 1));
      --radius-lg: calc(12px * var(--font-scale, 1));
      --radius-xl: calc(16px * var(--font-scale, 1));

      /* Font Sizes */
      --font-xs: calc(12px * var(--font-scale, 1));
      --font-sm: calc(14px * var(--font-scale, 1));
      --font-md: calc(16px * var(--font-scale, 1));
      --font-lg: calc(18px * var(--font-scale, 1));
      --font-xl: calc(20px * var(--font-scale, 1));
      --font-2xl: calc(24px * var(--font-scale, 1));
    }

    body {
      margin: 0;
      padding: 20px;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      min-height: 100vh;
    }
    
    .chat-container {
      max-width: 800px;
      margin: 0 auto;
      height: calc(100vh - 40px);
      display: flex;
      flex-direction: column;
    }
    
    .chat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--spacing-lg);
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      margin-bottom: var(--spacing-lg);
    }
    
    .chat-header h1 {
      margin: 0;
      color: var(--text-primary);
      font-size: var(--font-xl);
    }
    
    .chat-header .header-actions {
      display: flex;
      gap: var(--spacing-sm);
    }
    
    .chat-header button, .chat-header select {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-md);
      padding: var(--spacing-xs) var(--spacing-sm);
      cursor: pointer;
      color: var(--text-primary);
      font-size: var(--font-md);
    }
    
    .chat-header button:hover {
      background: var(--bg-hover);
    }
    
    .chat-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <h1>💎 Prism Chat</h1>
      <div class="header-actions">
        <select id="providerSelector" class="provider-selector">
          <option value="openai">OpenAI</option>
          <option value="gemini">Gemini</option>
          <option value="claude">Claude</option>
          <option value="qwen">Qwen</option>
          <option value="prism-api">Prism API</option>
          <option value="koboldcpp">KoboldCPP</option>
          <option value="llamacpp">Llama.cpp</option>
          <option value="ollama">Ollama</option>
          <option value="sglang">SGLang</option>
          <option value="transformers">Transformers</option>
          <option value="deepseek">DeepSeek</option>
          <option value="grok">Grok</option>
          <option value="openrouter">OpenRouter</option>
          <option value="poe">Poe</option>
        </select>
        <button id="clearHistoryBtn" title="Clear Chat History">🗑️</button>
      </div>
    </div>
    <div class="chat-content" id="chatApp">
      <!-- Chat content will be rendered here by React -->
    </div>
  </div>

  <script type="module" src="./src/chat/chat-entry.tsx"></script>
</body>
</html>
