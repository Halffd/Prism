version: '3.8'

services:
  # Supabase ecosystem
  supabase-db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 10
  
  supabase-auth:
    image: supabase/gotrue:v2
    depends_on:
      supabase-db:
        condition: service_healthy
    restart: always
    environment:
      GOTRUE_JWT_SECRET: your-super-secret-jwt-token-with-at-least-32-characters-long
      GOTRUE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5NTAwMDExMDB9.ImIH1KrPX73Yd4uVw3f7A_13iF_6N6d696000000000
      GOTRUE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InN1cGFiYXNlX3NlcnZpY2Vfcm9sZSIsImV4cCI6MTk1MDAwMTEwMH0.2VkSq4bM8YpVS2Laq4TZQ5OaEhiuNYk0RkX_3F14w00
      GOTRUE_EXTERNAL_EMAIL_ENABLED: 'true'
      GOTRUE_MAILER_HOST: smtp.gmail.com
      GOTRUE_MAILER_PORT: '587'
      GOTRUE_MAILER_USER: ''
      GOTRUE_MAILER_PASS: ''
      GOTRUE_MAILER_SECURE: 'false'
      GOTRUE_SITE_URL: 'http://localhost:3000'
    labels:
      - 'com.supabase.enabled=false'

  # Prism backend API
  prism-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      - supabase-db
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=http://supabase-db:5432
      - SUPABASE_SERVICE_ROLE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InN1cGFiYXNlX3NlcnZpY2Vfcm9sZSIsImV4cCI6MTk1MDAwMTEwMH0.2VkSq4bM8YpVS2Laq4TZQ5OaEhiuNYk0RkX_3F14w00
      - DATABASE_URL=postgresql://postgres:postgres@supabase-db:5432/postgres
    restart: always
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.prism-api.rule=Host(`api.yourdomain.com`)'
      - 'traefik.http.services.prism-api.loadbalancer.server.port=3000'

  # Prism web application
  prism-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    depends_on:
      - prism-api
    ports:
      - '3001:3000'
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=http://localhost:54321
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5NTAwMDExMDB9.ImIH1KrPX73Yd4uVw3f7A_13iF_6N6d696000000000
    restart: always
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.prism-web.rule=Host(`app.yourdomain.com`)'
      - 'traefik.http.services.prism-web.loadbalancer.server.port=3000'

  # Traefik reverse proxy
  traefik:
    image: traefik:v2.9
    command:
      - '--api.insecure=true'
      - '--providers.docker=true'
      - '--providers.docker.exposedbydefault=false'
      - '--entrypoints.web.address=:80'
      - '--entrypoints.websecure.address=:443'
      - '--certificatesresolvers.le.acme.httpchallenge=true'
      - '--certificatesresolvers.le.acme.challenge.httpchallenge.entrypoint=web'
      - '--certificatesresolvers.le.acme.email=your-email@example.com'
      - '--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json'
    ports:
      - '80:80'
      - '443:443'
      - '8080:8080'  # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
    restart: always

  # Optional: Redis for caching
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data:
  letsencrypt: